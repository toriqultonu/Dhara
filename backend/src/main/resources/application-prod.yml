spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dhara}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      password: ${REDIS_PASSWORD:}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.dhara: INFO
    org.springframework: WARN
  pattern:
    console: '{"timestamp":"%d","level":"%p","logger":"%logger","message":"%m"}%n'

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

grpc:
  rag-service:
    host: ${RAG_SERVICE_HOST:rag-service}
    port: ${RAG_SERVICE_GRPC_PORT:50051}

cors:
  allowed-origins: ${CORS_ORIGINS:https://dhara.law}

server:
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain
