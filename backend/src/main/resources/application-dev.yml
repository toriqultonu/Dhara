spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/dhara
    username: postgres
    password: 123456
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.dhara: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: dev-secret-key-at-least-32-characters-long-for-hs256
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

grpc:
  rag-service:
    host: localhost
    port: 50051

cors:
  allowed-origins: http://localhost:3000
